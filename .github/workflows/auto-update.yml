name: Autonomous Repo Update

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: autonomous-update
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 220

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git identity
        env:
          GIT_USER_NAME: ${{ vars.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL }}
          DEFAULT_ACTOR: ${{ github.actor }}
        run: |
          NAME_TO_USE="${GIT_USER_NAME:-$DEFAULT_ACTOR}"
          EMAIL_TO_USE="${GIT_USER_EMAIL:-$DEFAULT_ACTOR@users.noreply.github.com}"
          git config user.name "$NAME_TO_USE"
          git config user.email "$EMAIL_TO_USE"

      - name: Validate required secrets
        id: secret_check
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "run_agent=false" >> "$GITHUB_OUTPUT"
            echo "GROQ_API_KEY is not configured. Skipping autonomous run." >&2
          else
            echo "run_agent=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run autonomous agent
        id: agent_run
        if: steps.secret_check.outputs.run_agent == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          MODEL: ${{ vars.MODEL }}
          PRIMARY_MODEL: ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL: ${{ vars.FALLBACK_MODEL }}
          SAFE_MODEL: ${{ vars.SAFE_MODEL }}
          AGENT_ENABLE_DELAY: "false"
          AGENT_STRICT_MODE: "false"
        run: |
          echo "start_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          npm run agent:run

      - name: Fallback maintenance commit (agent produced no commit)
        if: steps.secret_check.outputs.run_agent == 'true'
        run: |
          START_SHA="${{ steps.agent_run.outputs.start_sha }}"
          CURRENT_SHA="$(git rev-parse HEAD)"

          if [ "$CURRENT_SHA" != "$START_SHA" ]; then
            echo "Agent produced a commit already. No fallback commit needed."
            exit 0
          fi

          mkdir -p .github
          touch .github/agent-heartbeat.log
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) planner/no-op fallback heartbeat" >> .github/agent-heartbeat.log

          git add .github/agent-heartbeat.log
          if git diff --cached --quiet; then
            echo "No fallback changes to commit."
            exit 0
          fi

          git commit -m "chore(agent): fallback heartbeat after no-op run"
          git push origin "${GITHUB_REF_NAME}"

      - name: Fallback maintenance commit (no Groq key)
        if: steps.secret_check.outputs.run_agent == 'false'
        run: |
          mkdir -p .github
          touch .github/agent-heartbeat.log

          LAST_DATE="$(tail -n 1 .github/agent-heartbeat.log | cut -d' ' -f1 || true)"
          TODAY="$(date -u +%Y-%m-%d)"

          if [ "$LAST_DATE" = "$TODAY" ]; then
            echo "Heartbeat already recorded today. No fallback commit needed."
            exit 0
          fi

          echo "${TODAY} missing GROQ_API_KEY -> maintenance heartbeat" >> .github/agent-heartbeat.log

          git add .github/agent-heartbeat.log
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(agent): daily heartbeat without Groq key"
          git push origin "${GITHUB_REF_NAME}"
