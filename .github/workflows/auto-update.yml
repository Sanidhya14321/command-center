name: Autonomous Repo Update

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: autonomous-update
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 220

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git identity
        run: |
          git config user.name "autonomous-ai-agent"
          git config user.email "autonomous-ai-agent@users.noreply.github.com"

      - name: Validate required secrets
        id: secret_check
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "run_agent=false" >> "$GITHUB_OUTPUT"
            echo "GROQ_API_KEY is not configured. Skipping autonomous run." >&2
          else
            echo "run_agent=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run autonomous agent
        if: steps.secret_check.outputs.run_agent == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          MODEL: ${{ vars.MODEL }}
          PRIMARY_MODEL: ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL: ${{ vars.FALLBACK_MODEL }}
          SAFE_MODEL: ${{ vars.SAFE_MODEL }}
          AGENT_ENABLE_DELAY: "false"
          AGENT_STRICT_MODE: "false"
        run: npm run agent:run
