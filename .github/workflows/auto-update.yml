name: Autonomous Repo Update

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: autonomous-update
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 220

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git identity
        env:
          GIT_USER_NAME: ${{ vars.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL }}
          DEFAULT_ACTOR: ${{ github.actor }}
        run: |
          NAME_TO_USE="${GIT_USER_NAME:-$DEFAULT_ACTOR}"
          EMAIL_TO_USE="${GIT_USER_EMAIL:-$DEFAULT_ACTOR@users.noreply.github.com}"
          git config user.name "$NAME_TO_USE"
          git config user.email "$EMAIL_TO_USE"

      - name: Validate required secrets
        id: secret_check
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          MODEL: ${{ vars.MODEL }}
          PRIMARY_MODEL: ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL: ${{ vars.FALLBACK_MODEL }}
          SAFE_MODEL: ${{ vars.SAFE_MODEL }}
        run: |
          missing=0
          if [ -z "$GROQ_API_KEY" ]; then
            echo "GROQ_API_KEY is not configured. Failing run." >&2
            missing=1
          fi
          if [ -z "$NEWS_API_KEY" ]; then
            echo "NEWS_API_KEY is not configured. Failing run." >&2
            missing=1
          fi
          if [ -z "$MODEL" ]; then
            echo "MODEL is not configured. Defaulting to auto." >&2
          fi
          if [ -z "$PRIMARY_MODEL" ]; then
            echo "PRIMARY_MODEL is not configured. Defaulting to auto." >&2
          fi
          if [ -z "$FALLBACK_MODEL" ]; then
            echo "FALLBACK_MODEL is not configured. Defaulting to llama-3.3-70b-versatile." >&2
          fi
          if [ -z "$SAFE_MODEL" ]; then
            echo "SAFE_MODEL is not configured. Defaulting to mixtral-8x7b-32768." >&2
          fi
          if [ "$missing" -eq 1 ]; then
            echo "run_agent=false" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "run_agent=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run autonomous agent
        id: agent_run
        if: steps.secret_check.outputs.run_agent == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          MODEL: ${{ vars.MODEL }}
          PRIMARY_MODEL: ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL: ${{ vars.FALLBACK_MODEL }}
          SAFE_MODEL: ${{ vars.SAFE_MODEL }}
          AGENT_ENABLE_DELAY: "false"
          AGENT_STRICT_MODE: "false"
        run: |
          export MODEL="${MODEL:-auto}"
          export PRIMARY_MODEL="${PRIMARY_MODEL:-auto}"
          export FALLBACK_MODEL="${FALLBACK_MODEL:-llama-3.3-70b-versatile}"
          export SAFE_MODEL="${SAFE_MODEL:-mixtral-8x7b-32768}"
          echo "start_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          npm run agent:run

      - name: Retry autonomous agent with forced component update
        if: steps.secret_check.outputs.run_agent == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          MODEL: ${{ vars.MODEL }}
          PRIMARY_MODEL: ${{ vars.PRIMARY_MODEL }}
          FALLBACK_MODEL: ${{ vars.FALLBACK_MODEL }}
          SAFE_MODEL: ${{ vars.SAFE_MODEL }}
          AGENT_ENABLE_DELAY: "false"
          AGENT_STRICT_MODE: "true"
          AGENT_FORCE_COMPONENT_UPDATE: "true"
        run: |
          export MODEL="${MODEL:-auto}"
          export PRIMARY_MODEL="${PRIMARY_MODEL:-auto}"
          export FALLBACK_MODEL="${FALLBACK_MODEL:-llama-3.3-70b-versatile}"
          export SAFE_MODEL="${SAFE_MODEL:-mixtral-8x7b-32768}"
          START_SHA="${{ steps.agent_run.outputs.start_sha }}"
          CURRENT_SHA="$(git rev-parse HEAD)"

          if [ "$CURRENT_SHA" != "$START_SHA" ]; then
            echo "Primary run already produced a commit. Skipping forced retry."
            exit 0
          fi

          npm run agent:run

      - name: Verify autonomous commit created
        if: steps.secret_check.outputs.run_agent == 'true'
        run: |
          START_SHA="${{ steps.agent_run.outputs.start_sha }}"
          CURRENT_SHA="$(git rev-parse HEAD)"

          if [ "$CURRENT_SHA" = "$START_SHA" ]; then
            echo "Autonomous run produced no commit even after forced component retry." >&2
            exit 1
          fi

          echo "Autonomous run produced commit ${CURRENT_SHA}."
